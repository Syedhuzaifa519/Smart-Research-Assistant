<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Research Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        pre { background: #1a1a1a; color: #fff; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        #output h1 { font-size: 2rem; font-weight: 700; margin: 1.5rem 0; color: #fff; }
        #output h2 { font-size: 1.5rem; font-weight: 600; margin: 1.2rem 0; color: #a855f7; }
        #output ul { list-style: disc; margin-left: 1.5rem; color: #d1d5db; }
        #output p { margin: 1rem 0; color: #d1d5db; line-height: 1.6; }
        #output a { color: #6366f1; text-decoration: underline; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold gradient-text mb-4">Smart Research Assistant</h1>
            <p class="text-slate-400 text-lg">Autonomous agentic intelligence for deep information synthesis.</p>
        </header>

        <section class="mb-12">
            <div class="relative group">
                <input type="text" id="topic" placeholder="What would you like to research?" 
                    class="w-full bg-[#1e293b] border border-slate-700 rounded-2xl py-4 px-6 text-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all shadow-xl group-hover:border-slate-500">
                <button onclick="startResearch()" id="searchBtn"
                    class="absolute right-3 top-2 bottom-2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-50 to-purple-500 text-white font-bold py-2 px-8 rounded-xl transition-all flex items-center gap-2">
                    Research
                    <span id="loader" class="hidden animate-spin">🌀</span>
                </button>
            </div>
        </section>

        <section id="status-container" class="hidden mb-8">
            <div class="glass border border-slate-700 rounded-2xl p-6">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-purple-500/20 rounded-lg">
                        <div class="animate-pulse w-3 h-3 bg-purple-500 rounded-full"></div>
                    </div>
                    <div>
                        <h3 class="font-semibold text-purple-400">Agent Reasoning...</h3>
                        <p id="status-text" class="text-slate-400 text-sm">Searching web and extracting insights...</p>
                    </div>
                </div>
            </div>
        </section>

        <article id="result" class="hidden glass border border-slate-700 rounded-2xl p-8 shadow-2xl">
            <div id="output" class="prose prose-invert max-w-none"></div>
            <hr class="my-8 border-slate-700">
            <div class="flex justify-between items-center text-xs text-slate-500">
                <span id="usage-stats"></span>
                <button onclick="copyToClipboard()" class="hover:text-purple-400 transition-colors uppercase tracking-widest font-bold">Copy Markdown</button>
            </div>
        </article>
    </div>

    <script>
        async function startResearch() {
            const topic = document.getElementById('topic').value;
            const btn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const statusBox = document.getElementById('status-container');
            const resultBox = document.getElementById('result');
            const output = document.getElementById('output');

            if (!topic) return alert("Please enter a topic.");

            // UI Reset
            btn.disabled = true;
            loader.classList.remove('hidden');
            statusBox.classList.remove('hidden');
            resultBox.classList.add('hidden');
            output.innerHTML = "";

            try {
                const response = await fetch('/api/research', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic })
                });

                const data = await response.json();

                if (response.ok) {
                    output.innerHTML = marked.parse(data.report);
                    document.getElementById('usage-stats').innerText = 
                        `Tokens: ${data.usage.total_tokens} (In: ${data.usage.input_tokens}, Out: ${data.usage.output_tokens})`;
                    resultBox.classList.remove('hidden');
                } else {
                    output.innerHTML = `<div class="text-red-400 font-bold">Error: ${data.detail || "Something went wrong"}</div>`;
                    resultBox.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                output.innerHTML = `<div class="text-red-400 font-bold">Network Error: Failed to connect to API. Is the server running?</div>`;
                resultBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
                statusBox.classList.add('hidden');
            }
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            navigator.clipboard.writeText(text);
            alert("Report copied to clipboard!");
        }
    </script>
</body>
</html>
